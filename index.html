
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diamond EV+ V31</title>

<style>
body { background:#0c0c0c; color:#fff; font-family:Arial; margin:0; }
.header { padding:15px; text-align:center; background:#111; font-size:20px; }
button { width:90%; padding:14px; margin:10px; background:#00c853; border:none; border-radius:8px; }

.card {
  background:#161616;
  margin:10px;
  padding:14px;
  border-radius:10px;
  border:1px solid #222;
}

.ev { color:#00e676; font-weight:bold; }
.meta { font-size:12px; color:#aaa; }
.book { color:#ffd700; font-weight:bold; }
</style>
</head>

<body>

<div class="header">DIAMOND EV+ V31</div>
<button onclick="load()">LOAD PICKS</button>

<div id="out">Tap LOAD</div>

<script>

const ODDS_KEY = "405f318f6be17dfd8ffdcd5f5b66df4b";

// ===============================
// NORMALIZE
// ===============================
function normalize(name){
  return name.toLowerCase().replace(/[^a-z ]/g,"").trim();
}

// ===============================
// SAFE FETCH (WITH TIMEOUT)
// ===============================
async function safeFetch(url, timeout=5000){
  try{
    const controller = new AbortController();
    const id = setTimeout(()=>controller.abort(), timeout);

    let res = await fetch(url, { signal: controller.signal });
    clearTimeout(id);

    return await res.json();
  }catch{
    return null;
  }
}

// ===============================
// TIMEOUT WRAPPER
// ===============================
async function withTimeout(promise, fallback, ms=4000){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(()=>res(fallback), ms))
  ]);
}

// ===============================
// PLAYERS
// ===============================
async function getPlayers(){

  let data = await safeFetch(
    "https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&playerPool=ALL"
  );

  if(!data) return [];

  return data.stats[0].splits.slice(0,120).map(p=>({
    name:p.player.fullName,
    team:p.team.name,
    iso:parseFloat(p.stat.iso)||0,
    slg:parseFloat(p.stat.slg)||0,
    hr:p.stat.homeRuns,
    pa:p.stat.plateAppearances||1,
    k:(p.stat.strikeOuts/p.stat.plateAppearances)||0
  }));
}

// ===============================
// ODDS (BEST BOOK)
// ===============================
async function getOdds(){

  let data = await safeFetch(
    `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_KEY}&regions=us&markets=player_home_runs`
  );

  let map = {};

  data?.forEach(g=>{
    g.bookmakers?.forEach(b=>{

      let book = b.title;

      b.markets?.forEach(m=>{
        if(m.key==="player_home_runs"){

          m.outcomes.forEach(o=>{

            let name = normalize(o.name);

            if(!map[name] || o.price > map[name].odds){
              map[name] = {
                odds:o.price,
                book:book
              };
            }

          });

        }
      });

    });
  });

  return map;
}

// ===============================
// MATCH PLAYER → ODDS
// ===============================
function findOdds(playerName, oddsMap){

  let clean = normalize(playerName);
  let last = clean.split(" ").pop();

  let match = Object.keys(oddsMap).find(n=>n.includes(last));

  return match ? oddsMap[match] : {odds:400, book:"Fallback"};
}

// ===============================
// MODEL
// ===============================
function score(p){
  let hrRate = p.hr / p.pa;

  return (
    (p.iso*40) +
    (p.slg*25) +
    (hrRate*30) -
    (p.k*15)
  );
}

function calcEV(score, odds){
  let prob=Math.min(score/120,.6);
  let payout=odds/100;
  return (prob*payout)-(1-prob);
}

// ===============================
// MAIN
// ===============================
async function load(){

  let out=document.getElementById("out");
  out.innerHTML="Loading...";

  let players = await withTimeout(getPlayers(), []);
  let oddsMap = await withTimeout(getOdds(), {});

  // fallback players if API fails
  if(!players.length){
    players = [
      {name:"Aaron Judge",team:"Yankees",iso:.3,slg:.6,hr:30,pa:300,k:.25},
      {name:"Shohei Ohtani",team:"Dodgers",iso:.28,slg:.58,hr:28,pa:290,k:.23}
    ];
  }

  players = players.map(p=>{

    let o = findOdds(p.name, oddsMap);

    let s = score(p);
    let e = calcEV(s, o.odds);

    return {...p, odds:o.odds, book:o.book, ev:e};

  });

  players.sort((a,b)=>b.ev-a.ev);

  render(players.slice(0,10));
}

// ===============================
// UI
// ===============================
function render(players){

  let html = "<div style='padding:10px;font-weight:bold;'>TOP PLAYS</div>";

  html += players.map(p=>`
    <div class="card">
      <b>${p.name}</b><br>
      <span class="meta">${p.team}</span><br>
      <span class="meta">Odds +${p.odds}</span><br>
      <span class="book">Best Book: ${p.book}</span><br>
      <div class="ev">EV ${p.ev.toFixed(2)}</div>
    </div>
  `).join("");

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
